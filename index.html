<!DOCTYPE html>
<html>
  <head> 
    <meta charset="utf-8">
    <title>WebXR Spidey: Drone Hunt</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <script src="game.js"></script>
    <meta charset="utf-8">
    <title>WebXR Spidey: Drone Hunt</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene environment="preset: Tron; dressingAmount: 0">
      
      <a-entity id="rig" position="0 15 0">
        <a-entity id="camera" camera look-controls position="0 1.6 0"></a-entity>
        <a-entity id="right-hand" oculus-touch-controls="hand: right" 
                  raycaster="objects: .building, .suit, .enemy; far: 100" 
                  line="color: red; opacity: 0.5"></a-entity>
      </a-entity>

      <a-entity id="apartment" position="0 15 0">
        <a-box position="0 -0.1 0" width="10" height="0.2" depth="10" color="#222"></a-box>
        <a-box id="suit" class="suit" position="2 1 -2" width="0.6" height="0.1" depth="0.6" color="red"></a-box>
        <a-text value="EQUIP SUIT" position="1.5 1.5 -2" color="white"></a-text>
      </a-entity>

      <a-entity id="city-generator"></a-entity>
      <a-entity id="enemy-container"></a-entity>

    </a-scene>

    <script>
      const city = document.querySelector('#city-generator');
      const enemies = document.querySelector('#enemy-container');
      const hand = document.querySelector('#right-hand');
      const rig = document.querySelector('#rig');
      
      let hasSuit = false;
      let isSwinging = false;
      let targetPoint = new THREE.Vector3();
      let velocity = new THREE.Vector3(0, 0, 0);

      // --- 1. CITY GENERATOR ---
      for (let i = 0; i < 60; i++) {
        let b = document.createElement('a-box');
        let h = Math.random() * 50 + 10;
        b.setAttribute('class', 'building');
        b.setAttribute('position', `${(Math.random()-0.5)*200} ${h/2} ${(Math.random()-0.5)*200}`);
        b.setAttribute('height', h);
        b.setAttribute('width', 8);
        b.setAttribute('depth', 8);
        b.setAttribute('color', '#111');
        city.appendChild(b);
      }

      // --- 2. ENEMY GENERATOR (The Drones) ---
      for (let i = 0; i < 15; i++) {
        let drone = document.createElement('a-sphere');
        drone.setAttribute('class', 'enemy');
        drone.setAttribute('radius', '1');
        drone.setAttribute('color', '#FF00FF'); // Bright pink drones
        drone.setAttribute('position', `${(Math.random()-0.5)*150} ${Math.random()*30 + 10} ${(Math.random()-0.5)*150}`);
        
        // Make them float up and down
        drone.setAttribute('animation', `property: position; dir: alternate; dur: 2000; loop: true; to: ${drone.getAttribute('position').x} ${Math.random()*40 + 5} ${drone.getAttribute('position').z}`);
        
        enemies.appendChild(drone);
      }

      // --- 3. INTERACTION LOGIC ---
      hand.addEventListener('triggerdown', () => {
        let ray = hand.components.raycaster;
        let hit = ray.intersections[0];
        if (!hit) return;

        let target = hit.object.el;

        // Suit Check
        if (target.id === 'suit') {
          hasSuit = true;
          target.setAttribute('visible', 'false');
        } 
        
        // Combat Check (Hitting a Drone)
        else if (hasSuit && target.classList.contains('enemy')) {
          target.setAttribute('visible', 'false'); // "Destroy" the drone
          console.log("Enemy Down!");
          // Visual feedback: Web line to drone
          renderWeb(hit.point);
        }
        
        // Swinging Check
        else if (hasSuit && target.classList.contains('building')) {
          targetPoint.copy(hit.point);
          isSwinging = true;
          renderWeb(hit.point);
        }
      });

      hand.addEventListener('triggerup', () => { 
        isSwinging = false; 
        hand.setAttribute('line', {opacity: 0.5, color: 'red'});
      });

      function renderWeb(point) {
        hand.setAttribute('line', {
          start: {x: 0, y: 0, z: 0},
          end: hand.object3D.worldToLocal(point.clone()),
          color: 'white',
          opacity: 1
        });
      }

      // --- 4. PHYSICS TICK ---
      function tick() {
        if (isSwinging) {
          let dir = new THREE.Vector3().subVectors(targetPoint, rig.object3D.position).normalize();
